<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guest Link Generator — Aseem & Anjali</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; padding: 28px 16px 40px;
      font-family: 'Jost', sans-serif; color: #3A352B;
      background: linear-gradient(175deg, #EDE5D4 0%, #E2D6C0 45%, #D6C8AE 100%);
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    h1 {
      font-family: 'Tiro Devanagari Hindi', serif; font-size: 22px; font-weight: 400;
      color: #8B3A12; text-align: center; margin: 0 0 24px; letter-spacing: .06em;
    }
    .card {
      background: linear-gradient(180deg, #FEFCF8 0%, #FAF6EE 100%);
      border: 1px solid rgba(184,149,63,.35);
      box-shadow: 0 12px 32px rgba(72,54,28,.1), inset 0 0 0 4px #FEFCF8;
      border-radius: 14px; padding: 22px 20px; margin-bottom: 16px;
    }
    label {
      display: block; font-size: 12px; font-weight: 500; color: #8A7C62;
      letter-spacing: .06em; margin-bottom: 6px; text-transform: uppercase;
    }
    input, textarea {
      width: 100%; padding: 11px 14px; border-radius: 10px;
      border: 1px solid rgba(170,140,80,.35);
      background: rgba(255,255,255,.7); font-family: 'Tiro Devanagari Hindi', serif;
      font-size: 16px; color: #3A352B; outline: none;
    }
    input:focus, textarea:focus { border-color: rgba(201,164,81,.65); box-shadow: 0 0 0 3px rgba(201,164,81,.12); }
    textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
    .field { margin-bottom: 16px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row .field { flex: 1; min-width: 140px; }
    button, .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 11px 18px; border-radius: 999px; border: 1px solid rgba(170,140,80,.4);
      background: linear-gradient(160deg, #FDFAF2, #F3E8D0); color: #8B3A12;
      font-family: 'Tiro Devanagari Hindi', serif; font-size: 14px; cursor: pointer;
      box-shadow: 0 4px 12px rgba(150,120,55,.12);
    }
    button.primary {
      background: linear-gradient(160deg, #C9A451, #9A7C40 68%, #86692E);
      color: #FCF8F0; border-color: transparent;
    }
    button:active { transform: scale(.98); }
    .out {
      margin-top: 14px; padding: 12px 14px; border-radius: 10px;
      background: rgba(255,252,245,.8); border: 1px dashed rgba(184,149,63,.35);
      word-break: break-all; font-size: 13px; line-height: 1.55; color: #6E6555;
    }
    .out a { color: #8B3A12; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .hint { font-size: 12px; color: #9A8A72; line-height: 1.55; margin-top: 10px; }
    .ok { color: #7A5F2E; font-size: 13px; margin-top: 8px; min-height: 18px; }
    hr { border: none; border-top: 1px solid rgba(170,140,80,.2); margin: 20px 0; }
    .bulk-results {
      display: none; margin-top: 14px; border-radius: 10px;
      border: 1px solid rgba(184,149,63,.28); background: rgba(255,252,245,.85);
      overflow: hidden;
    }
    .bulk-results.show { display: block; }
    .bulk-results-head {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 10px 12px; background: rgba(243,232,208,.55);
      border-bottom: 1px solid rgba(170,140,80,.18);
      font-size: 12px; color: #8A7C62;
    }
    .bulk-list { max-height: 280px; overflow: auto; }
    .bulk-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 12px; border-bottom: 1px solid rgba(170,140,80,.12);
    }
    .bulk-item:last-child { border-bottom: none; }
    .bulk-item-main { flex: 1; min-width: 0; }
    .bulk-item-name {
      font-family: 'Tiro Devanagari Hindi', serif; font-size: 15px; color: #3A352B;
      margin-bottom: 3px;
    }
    .bulk-item-url {
      font-size: 11px; line-height: 1.45; color: #8A7C62; word-break: break-all;
    }
    .bulk-item-url a { color: #8B3A12; text-decoration: none; }
    button.copy-one {
      flex-shrink: 0; padding: 7px 12px; font-size: 12px;
    }
    .bulk-text {
      width: 100%; min-height: 140px; margin-top: 12px; padding: 11px 14px;
      border-radius: 10px; border: 1px solid rgba(170,140,80,.35);
      background: rgba(255,255,255,.75); font-size: 12px; line-height: 1.55;
      color: #3A352B; resize: vertical; font-family: 'Jost', sans-serif;
    }
    .secondary-actions { margin-top: 10px; }
    .secondary-actions button { font-size: 12px; padding: 8px 14px; opacity: .92; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>निमन्त्रणा लिङ्क बनाउनुहोस्</h1>

    <div class="card">
      <h2 style="font-family:'Tiro Devanagari Hindi',serif;font-size:17px;color:#8B3A12;margin:0 0 14px;font-weight:400;">Bulk · many guests</h2>
      <div class="field">
        <label for="baseUrl">Invitation base URL</label>
        <input id="baseUrl" type="url" placeholder="https://your-site.netlify.app/">
      </div>
      <div class="field">
        <label for="nameList">One name per line</label>
        <textarea id="nameList" placeholder="राम श्रेष्ठ&#10;सunita गुरुङ्ग&#10;Mr. Sharma & family"></textarea>
      </div>
      <div class="row">
        <div class="field">
          <label>Link style</label>
          <select id="linkStyle" style="width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(170,140,80,.35);background:rgba(255,255,255,.7);font-size:14px;">
            <option value="to">Simple — name in link (?to=…) · recommended</option>
            <option value="g">Short token (?g=…) · needs guests.json upload</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="primary" id="bulkGenerate">Generate all links</button>
        <button type="button" id="bulkCopy">Copy all</button>
        <button type="button" id="bulkWhatsApp">Copy for WhatsApp</button>
      </div>
      <div class="ok" id="bulkMsg"></div>

      <div class="bulk-results" id="bulkResults">
        <div class="bulk-results-head">
          <span id="bulkCount">0 links</span>
          <button type="button" class="copy-one" id="bulkSelectAll">Select all text</button>
        </div>
        <div class="bulk-list" id="bulkList"></div>
        <textarea class="bulk-text" id="bulkText" readonly placeholder="All links appear here — tap Select all text, then copy."></textarea>
      </div>

      <details class="secondary-actions">
        <summary style="cursor:pointer;font-size:12px;color:#9A8A72;margin-top:12px;">Download files (optional)</summary>
        <div class="actions" style="margin-top:10px;">
          <button type="button" id="bulkCsv">Download CSV</button>
          <button type="button" id="bulkGuests">Download guests.json</button>
        </div>
      </details>

      <p class="hint"><strong>Simplest way:</strong> paste names → Generate all links → Copy for WhatsApp → send each guest their link. No file download needed.</p>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const baseInput = $('baseUrl');
    const bulkMsg = $('bulkMsg');
    const bulkResults = $('bulkResults');
    const bulkList = $('bulkList');
    const bulkText = $('bulkText');
    const bulkCount = $('bulkCount');
    let lastBulk = null;

    function defaultBaseUrl() {
      const dir = location.pathname.replace(/[^/]*$/, '');
      return location.origin + dir + 'index.html';
    }

    baseInput.value = defaultBaseUrl();

    function baseUrl() {
      let u = (baseInput.value || '').trim();
      if (!u) u = defaultBaseUrl();
      if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
      return u.replace(/\?.*$/, '').replace(/#.*$/, '');
    }

    function parseNames(raw) {
      return String(raw || '')
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)
        .flatMap((line) => {
          if (/[,;]/.test(line)) {
            return line.split(/[,;]+/).map((n) => n.trim()).filter(Boolean);
          }
          return [line.replace(/\t+/g, ' ').trim()];
        })
        .filter(Boolean);
    }

    function uniqueToken(used) {
      const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
      let token = '';
      do {
        token = '';
        for (let i = 0; i < 6; i++) token += chars[Math.floor(Math.random() * chars.length)];
      } while (used.has(token));
      used.add(token);
      return token;
    }

    function buildBulkRows(names, useToken) {
      const base = baseUrl();
      const used = new Set();
      const guestMap = {};
      const rows = names.map((name) => {
        if (useToken) {
          const token = uniqueToken(used);
          guestMap[token] = name;
          return { name, token, url: base + '?g=' + encodeURIComponent(token) };
        }
        return { name, url: base + '?to=' + encodeURIComponent(name) };
      });
      return { rows, guestMap };
    }

    function runBulk() {
      const names = parseNames($('nameList').value);
      if (!names.length) {
        bulkMsg.textContent = 'Add at least one guest name.';
        bulkResults.classList.remove('show');
        lastBulk = null;
        return null;
      }
      const useToken = $('linkStyle').value === 'g';
      const { rows, guestMap } = buildBulkRows(names, useToken);
      lastBulk = { names, useToken, rows, guestMap };
      return lastBulk;
    }

    function rowsAsPlainText(rows) {
      return rows.map((r) => r.name + '\n' + r.url).join('\n\n');
    }

    function rowsAsWhatsApp(rows) {
      return rows.map((r) =>
        '🙏 नमस्ते ' + r.name + ' ज्यू,\n\n' +
        'आसिम र अञ्जलीको शुभ विवाहमा हार्दिक निमन्त्रणा छ।\n\n' +
        '॥ शुभ विवाह ॥\n' +
        '१३ असार २०८३ · २७ जुन २०२६\n' +
        'कुश्मा, पर्वत\n\n' +
        'निमन्त्रणा हेर्नुहोस् 👇\n' +
        r.url
      ).join('\n\n━━━━━━━━━━━━\n\n');
    }

    function renderBulkResults(data) {
      bulkResults.classList.add('show');
      bulkCount.textContent = data.rows.length + ' link' + (data.rows.length === 1 ? '' : 's');
      bulkList.innerHTML = data.rows.map((r, i) =>
        '<div class="bulk-item">' +
          '<div class="bulk-item-main">' +
            '<div class="bulk-item-name">' + escapeHtml(r.name) + '</div>' +
            '<div class="bulk-item-url"><a href="' + escapeHtml(r.url) + '" target="_blank" rel="noopener">' + escapeHtml(r.url) + '</a></div>' +
          '</div>' +
          '<button type="button" class="copy-one" data-copy-index="' + i + '">Copy</button>' +
        '</div>'
      ).join('');
      bulkText.value = rowsAsPlainText(data.rows);
      bulkMsg.textContent = 'Ready — copy one link or use Copy for WhatsApp.';
    }

    async function copyText(text, okMsg) {
      try {
        await navigator.clipboard.writeText(text);
        bulkMsg.textContent = okMsg;
        return true;
      } catch (_) {
        bulkText.value = text;
        bulkText.removeAttribute('readonly');
        bulkText.focus();
        bulkText.select();
        bulkMsg.textContent = 'Tap Select all text below, then copy manually.';
        return false;
      }
    }

    $('bulkGenerate').onclick = () => {
      const data = runBulk();
      if (!data) return;
      renderBulkResults(data);
    };

    bulkList.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-copy-index]');
      if (!btn || !lastBulk) return;
      const row = lastBulk.rows[Number(btn.dataset.copyIndex)];
      if (!row) return;
      await copyText(row.url, 'Copied link for ' + row.name + '.');
    });


    $('bulkSelectAll').onclick = () => {
      if (!lastBulk) { bulkMsg.textContent = 'Generate links first.'; return; }
      bulkText.removeAttribute('readonly');
      bulkText.focus();
      bulkText.select();
      bulkMsg.textContent = 'Text selected — press Copy on your phone or Cmd/Ctrl+C.';
    };

    $('bulkCopy').onclick = async () => {
      let data = lastBulk;
      if (!data) {
        data = runBulk();
        if (!data) return;
        renderBulkResults(data);
      }
      await copyText(rowsAsPlainText(data.rows), 'Copied ' + data.rows.length + ' links.');
    };

    $('bulkWhatsApp').onclick = async () => {
      let data = lastBulk;
      if (!data) {
        data = runBulk();
        if (!data) return;
        renderBulkResults(data);
      }
      await copyText(rowsAsWhatsApp(data.rows), 'Copied WhatsApp messages for ' + data.rows.length + ' guests.');
    };

    $('bulkCsv').onclick = () => {
      let data = lastBulk;
      if (!data) {
        data = runBulk();
        if (!data) return;
        renderBulkResults(data);
      }
      const header = data.useToken ? ['Name', 'Link', 'Token'] : ['Name', 'Link'];
      const lines = [header];
      data.rows.forEach((r) => {
        lines.push(data.useToken ? [r.name, r.url, r.token] : [r.name, r.url]);
      });
      const csv = '\uFEFF' + lines.map((r) => r.map(csvCell).join(',')).join('\r\n');
      if (downloadText(csv, 'invitation-links.csv', 'text/csv;charset=utf-8')) {
        bulkMsg.textContent = 'Downloaded CSV with ' + data.rows.length + ' links.';
      } else {
        bulkText.value = csv;
        bulkMsg.textContent = 'Download blocked — copy from the text box below.';
      }
    };

    $('bulkGuests').onclick = () => {
      let data = lastBulk;
      if (!data) {
        data = runBulk();
        if (!data) return;
        renderBulkResults(data);
      }
      if (!data.useToken) {
        bulkMsg.textContent = 'Switch link style to Short token (?g=…) for guests.json.';
        return;
      }
      const json = JSON.stringify(data.guestMap, null, 2);
      if (downloadText(json, 'guests.json', 'application/json;charset=utf-8')) {
        bulkMsg.textContent = 'Downloaded guests.json — upload to your site and redeploy.';
      } else {
        bulkText.value = json;
        bulkMsg.textContent = 'Download blocked — copy JSON from the text box below.';
      }
    };

    function csvCell(v) {
      const s = String(v);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function downloadText(text, filename, type) {
      try {
        const blob = new Blob([text], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 4000);
        return true;
      } catch (_) {
        return false;
      }
    }
  </script>
</body>
</html>
